<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest-clearandcalm.json" />
    <link rel="apple-touch-icon" href="/icons/cc-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clear &amp; Calm" />
    <meta name="theme-color" content="#0e9aa7" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Clear &amp; Calm</title>

    <meta name="description" content="Track cravings, breathe through them, build your stillness practice." />
    <meta property="og:title" content="Clear &amp; Calm" />
    <meta property="og:description" content="Track cravings, breathe through them, build your stillness practice." />
    <meta property="og:image" content="https://pneumevolve.com/icons/cc-512.png" />

    <script>
      (() => {
        const saved = localStorage.getItem("theme");
        const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefers)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>

    <script>
      (function () {
        const on = new URLSearchParams(location.search).has('debug');
        if (!on) return;
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = function(){ eruda.init(); };
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
